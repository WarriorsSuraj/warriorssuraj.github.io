<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarriorsSuraj - Computer Science Projects</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/Images/Favicons/calculator.png">

    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2 {
            margin: 0;
        }

        a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        a:hover {
            color: #b3b3b3;
        }

        /* Header Styles */
        header {
            background: linear-gradient(to left, #4375f3, #0c2d66);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #d1e0ff;
        }

        /* Navigation Bar */
        nav {
            background-color: #000000;
            display: flex;
            justify-content: center;
            padding: 10px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        nav a {
            margin: 0 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        nav a:hover {
            color: #d1e0ff;
        }

        /* Main Content Section */
        .about-container {
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .about-container h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            color: #082f74;
        }

        .about-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .about-content img {
            max-width: 100%;
            width: 500px;
            height: 500px;
            border-radius: 10px;
            margin: 0 auto;
            display: block;
        }

        .about-text {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: justify;
        }

        /* Footer Styles */
        footer {
            background: linear-gradient(to right, #3e73f8, #082f74);
            color: white;
            text-align: center;
            padding: 15px 0;
        }

        footer p {
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>WarriorsSuraj: Computer Science Projects</h1>
    </header>
</body>
</html>
